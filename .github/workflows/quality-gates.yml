name: Quality Gates

on:
  pull_request:
    paths:
      - "08-platforms/vercel-sites/suitedash-good-parts-preview/**"
      - ".storybook/**"
      - ".lighthouserc.json"
      - ".pa11yci.json"
      - "playwright.config.mjs"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "governance/**"
      - ".github/workflows/quality-gates.yml"
  push:
    branches:
      - main
    paths:
      - "08-platforms/vercel-sites/suitedash-good-parts-preview/**"
      - ".storybook/**"
      - ".lighthouserc.json"
      - ".pa11yci.json"
      - "playwright.config.mjs"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "governance/**"
      - ".github/workflows/quality-gates.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install Pa11y browser
        run: npx puppeteer browsers install chrome

      - name: Build Storybook review surface
        run: npm run storybook:build

      - name: Run Playwright governance tests
        run: npm run test:e2e

      - name: Run Pa11y accessibility smoke
        run: npm run test:a11y

      - name: Run Lighthouse CI
        run: npm run test:lighthouse

      - name: Print governance status summary
        run: npm run observability:summary

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Storybook build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
