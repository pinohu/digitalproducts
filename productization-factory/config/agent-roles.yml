system_roles:
  paperclip:
    role: business_operating_layer
    responsibilities:
      - prioritize product families
      - create and track work orders
      - manage sprint sequencing
      - enforce governance gates
  hermes:
    role: persistent_memory_and_coordination
    responsibilities:
      - maintain tool-capability memory
      - maintain product-family memory
      - record decisions
      - extract reusable skills
      - prepare Codex-ready prompts
  codex:
    role: repo_implementation_layer
    responsibilities:
      - edit files
      - create scripts and templates
      - run validation and tests
      - keep repo truth current

